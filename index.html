<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Ditch DeWayne — An open letter from Blue Demon Nation</title>
<meta name="description" content="Six seasons. Zero NCAA Tournament appearances. One contract extension too many. An open letter to the DePaul Board of Trustees."/>
<meta property="og:title" content="Ditch DeWayne"/>
<meta property="og:description" content="An open letter from Blue Demon Nation."/>
<meta property="og:type" content="website"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'EB Garamond', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; }
  ::selection { background: oklch(0.42 0.10 250 / 0.2); }
  input, select, textarea { font-family: 'EB Garamond', Georgia, serif; }
  input:focus, select:focus, textarea:focus { border-color: oklch(0.22 0.01 60) !important; }
  /* Tablet */
  @media (max-width: 1024px) {
    section { padding-left: 32px !important; padding-right: 32px !important; }
    footer { padding-left: 32px !important; padding-right: 32px !important; }
  }

  /* Mobile */
  @media (max-width: 720px) {
    section { padding: 64px 20px !important; }
    footer { padding: 56px 20px 40px !important; }
    h1 { font-size: clamp(48px, 12vw, 80px) !important; }
    h2 { font-size: clamp(34px, 8.5vw, 56px) !important; }

    /* Collapse all 2- and 3-col grids to single column */
    [style*="grid-template-columns: 1fr 1fr"],
    [style*="grid-template-columns: 1.4fr 1fr"],
    [style*="grid-template-columns: 1fr 1.3fr"],
    [style*="grid-template-columns: 1.4fr 1fr 1fr"],
    [style*="grid-template-columns: repeat(3, 1fr)"] {
      grid-template-columns: 1fr !important;
      gap: 32px !important;
    }

    /* Cost-per-win calc 4-col → 2x2 */
    [style*="grid-template-columns: 1.3fr 1fr 1fr 1fr"] {
      grid-template-columns: 1fr 1fr !important;
      gap: 20px !important;
    }

    /* Drought timeline 22-col → 11-col */
    [style*="grid-template-columns: repeat(22, 1fr)"] {
      grid-template-columns: repeat(11, 1fr) !important;
    }

    /* Said vs. Seen 3-col → stacked */
    [style*="grid-template-columns: auto 1fr 1fr"] {
      grid-template-columns: 1fr !important;
    }

    /* Petition affiliation/year/zip 3-col → stacked pair */
    [style*="grid-template-columns: 1.4fr 1fr 1fr"] {
      grid-template-columns: 1fr !important;
      gap: 12px !important;
    }

    /* Trend table 5-col: shrink fonts/padding */
    [style*="grid-template-columns: 1.2fr 1fr 1fr 1.4fr 1fr"] > div {
      font-size: 12px !important;
      padding: 14px 2px !important;
    }

    /* Wall masonry: 1 col */
    [style*="columnCount: 3"],
    [style*="column-count: 3"] { column-count: 1 !important; }

    /* Hero H1 */
    [style*="clamp(64px, 9vw, 132px)"] {
      font-size: clamp(52px, 13vw, 84px) !important;
    }

    /* Big "22" numeral */
    [style*="clamp(180px, 26vw, 380px)"] {
      font-size: clamp(150px, 44vw, 240px) !important;
      margin-top: 0 !important;
    }

    /* Open-letter card: less padding on mobile */
    [style*="padding: \"64px 72px 72px\""] {
      padding: 40px 24px 48px !important;
    }

    /* Press tile padding */
    [style*="padding: \"24px 26px 22px\""] {
      padding: 18px 18px 16px !important;
    }

    /* Petition seal shrink/reposition */
    [style*="width: 92"][style*="height: 92"] {
      width: 56px !important;
      height: 56px !important;
      right: 14px !important;
      top: 14px !important;
    }
    [style*="width: 92"][style*="height: 92"] > div:first-child {
      font-size: 13px !important;
    }
    [style*="width: 92"][style*="height: 92"] > div:last-child {
      font-size: 7px !important;
    }

    /* Hero nav links wrap */
    nav { flex-wrap: wrap !important; gap: 14px !important; }

    /* Trend table inner padding */
    [style*="padding: \"8px 32px 32px\""] {
      padding: 4px 12px 16px !important;
    }

    /* Press release card padding */
    [style*="padding: \"36px 36px 40px\""] {
      padding: 24px 22px 28px !important;
    }
    [style*="padding: \"48px 48px 56px\""] {
      padding: 28px 20px 32px !important;
    }

    /* Hero CTA buttons */
    [style*="padding: \"16px 28px\""] { padding: 14px 22px !important; font-size: 11px !important; }

    /* Footer columns 3-col → 1-col */
    [style*="grid-template-columns: 1.4fr 1fr 1fr"] {
      grid-template-columns: 1fr !important;
    }
  }

  /* Very small phones */
  @media (max-width: 380px) {
    section { padding: 56px 16px !important; }
    h1 { font-size: clamp(44px, 13vw, 64px) !important; }
    h2 { font-size: clamp(30px, 9vw, 44px) !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script type="text/babel" data-presets="react" src="site.jsx"></script>
</body>
</html>
