<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Ditch DeWayne — An open letter from Blue Demon Nation</title>
<meta name="description" content="Six seasons. Zero NCAA Tournament appearances. One contract extension too many. An open letter to the DePaul Board of Trustees."/>
<meta property="og:title" content="Ditch DeWayne"/>
<meta property="og:description" content="An open letter from Blue Demon Nation."/>
<meta property="og:type" content="website"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    color: #1F2937;
    background: #fff;
  }
  a { color: inherit; }
  button { font-family: inherit; }
  input, select, textarea { font-family: 'Inter', sans-serif; }
  ::selection { background: rgba(237, 28, 36, 0.18); }

  /* Section base */
  .dn-section { padding: 96px 64px; }
  .dn-section .dn-wrap { max-width: 1240px; margin: 0 auto; }

  /* Sticky nav burger toggle */
  .dn-burger { display: none; }

  /* Buttons hover */
  .dn-btn-primary:hover { background: #C41722 !important; }
  .dn-btn-navy:hover { background: #061829 !important; }
  .dn-btn-outline:hover { background: #0A2540 !important; color: #fff !important; }

  /* Card hover lift */
  .dn-card { transition: transform .15s ease, box-shadow .15s ease; }
  .dn-card:hover { transform: translateY(-3px); box-shadow: 0 20px 40px -20px rgba(10,37,64,0.25); }

  /* Tablet */
  @media (max-width: 1024px) {
    .dn-section { padding: 80px 32px; }
    .dn-nav { gap: 22px !important; }
  }

  /* Tap targets — minimum 44px on touch devices */
  @media (hover: none) and (pointer: coarse) {
    a, button { min-height: 44px; }
  }

  /* Mobile */
  @media (max-width: 820px) {
    .dn-nav { display: none !important; }
    .dn-burger { display: inline-flex !important; }
    .dn-section { padding: 56px 20px !important; }
    .dn-h1 { font-size: clamp(38px, 10.5vw, 60px) !important; line-height: 1.02 !important; }
    .dn-h2 { font-size: clamp(28px, 7.6vw, 44px) !important; line-height: 1.05 !important; }
    .dn-h3 { font-size: clamp(22px, 5.8vw, 32px) !important; line-height: 1.1 !important; }
    .dn-eyebrow { font-size: 11px !important; letter-spacing: 0.16em !important; }
    .dn-grid-2,
    .dn-grid-3,
    .dn-grid-4,
    .dn-grid-asym,
    .dn-hero-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    .dn-grid-stats-4 { grid-template-columns: 1fr 1fr !important; gap: 16px !important; }
    .dn-trend-row { grid-template-columns: 1.4fr 1fr 1fr !important; padding: 18px 16px !important; }
    .dn-trend-row > .dn-trend-finish,
    .dn-trend-row > .dn-trend-ncaa,
    .dn-trend-head > .dn-trend-finish-h,
    .dn-trend-head > .dn-trend-ncaa-h { display: none !important; }
    .dn-trend-head { grid-template-columns: 1.4fr 1fr 1fr !important; padding: 14px 16px !important; }
    .dn-bars { grid-template-columns: repeat(11, 1fr) !important; gap: 3px !important; }
    .dn-bar-cell { height: 32px !important; font-size: 10px !important; }
    .dn-bar-label { font-size: 8px !important; }
    .dn-wall { column-count: 1 !important; }
    .dn-said-row { grid-template-columns: 1fr !important; padding: 22px 18px !important; gap: 10px !important; }
    .dn-said-row > div:first-child { font-size: 18px !important; }
    .dn-said-head { grid-template-columns: 1fr !important; gap: 6px !important; padding: 14px 18px !important; }
    .dn-said-head > div:first-child { display: none !important; }
    .dn-petition-card { padding: 36px 22px 40px !important; }
    .dn-petition-seal { width: 60px !important; height: 60px !important; right: 14px !important; top: 14px !important; }
    .dn-petition-seal > div:first-child { font-size: 11px !important; }
    .dn-petition-seal > div:last-child { font-size: 5px !important; }
    .dn-form { padding: 28px 22px 32px !important; }
    .dn-form-row-2,
    .dn-form-row-3 { grid-template-columns: 1fr !important; gap: 14px !important; }
    .dn-hero { background: #00417C !important; }
    .dn-hero-pad { padding: 48px 22px 64px !important; gap: 36px !important; }
    .dn-hero-stat { padding: 18px 20px !important; gap: 12px !important; }
    .dn-hero-stat > div:first-child { font-size: 30px !important; }
    .dn-hero-wedge { display: none !important; }
    .dn-hero-img { max-width: 320px; margin: 0 auto; aspect-ratio: 4/5 !important; }
    .dn-hero-buttons { flex-direction: column !important; align-items: stretch !important; gap: 12px !important; }
    .dn-hero-buttons > a { justify-content: center !important; width: 100%; }
    .dn-22 { font-size: clamp(140px, 42vw, 220px) !important; margin-top: 0 !important; }
    .dn-arena-grid > div { padding: 0 !important; }
    .dn-dot-grid { grid-template-columns: repeat(12, 1fr) !important; padding: 14px !important; gap: 3px !important; }
    .dn-cost-grid { grid-template-columns: 1fr 1fr !important; gap: 16px !important; }
    .dn-cost-grid > div:first-child { grid-column: 1 / -1; }
    .dn-rewarded-card { padding: 28px 22px 32px !important; }
    .dn-cost-wrap { padding: 28px 20px 32px !important; }
    .dn-footer { padding: 56px 22px 32px !important; }
    .dn-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
    .dn-footer-grid > div:first-child { grid-column: 1 / -1; }
    .dn-precedent-card { aspect-ratio: 0.78/1 !important; padding: 22px !important; }
    .dn-precedent-inner { top: 50px !important; left: 22px !important; right: 22px !important; bottom: 22px !important; padding: 18px !important; }
    .dn-precedent-inner > div:first-child { font-size: 22px !important; }
    .dn-headline-card { padding: 22px 22px 22px !important; }
    .dn-section-label-num { width: 32px !important; height: 32px !important; font-size: 13px !important; }
  }

  /* Small phone */
  @media (max-width: 420px) {
    .dn-section { padding: 48px 16px !important; }
    .dn-h1 { font-size: clamp(34px, 11vw, 50px) !important; }
    .dn-grid-stats-4 { grid-template-columns: 1fr !important; }
    .dn-cost-grid { grid-template-columns: 1fr !important; }
    .dn-cost-grid > div:first-child { grid-column: auto; }
    .dn-footer-grid { grid-template-columns: 1fr !important; }
    .dn-bars { grid-template-columns: repeat(11, 1fr) !important; }
  }
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script type="text/babel" data-presets="react" src="site.jsx"></script>

</html>
