<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Ditch DeWayne — An open letter from Blue Demon Nation</title>
<meta name="description" content="Six seasons. Zero NCAA Tournament appearances. One contract extension too many. An open letter to the DePaul Board of Trustees."/>
<meta property="og:title" content="Ditch DeWayne"/>
<meta property="og:description" content="An open letter from Blue Demon Nation."/>
<meta property="og:type" content="website"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    color: #1F2937;
    background: #fff;
  }
  a { color: inherit; }
  button { font-family: inherit; }
  input, select, textarea { font-family: 'Inter', sans-serif; }
  ::selection { background: rgba(237, 28, 36, 0.18); }

  /* Section base */
  .dn-section { padding: 96px 64px; }
  .dn-section .dn-wrap { max-width: 1240px; margin: 0 auto; }

  /* Sticky nav burger toggle */
  .dn-burger { display: none; }

  /* Buttons hover */
  .dn-btn-primary:hover { background: #C41722 !important; }
  .dn-btn-navy:hover { background: #061829 !important; }
  .dn-btn-outline:hover { background: #0A2540 !important; color: #fff !important; }

  /* Card hover lift */
  .dn-card { transition: transform .15s ease, box-shadow .15s ease; }
  .dn-card:hover { transform: translateY(-3px); box-shadow: 0 20px 40px -20px rgba(10,37,64,0.25); }

  /* Tablet */
  @media (max-width: 1024px) {
    .dn-section { padding: 80px 32px; }
    .dn-nav { gap: 22px !important; }
  }

  /* Mobile */
  @media (max-width: 820px) {
    .dn-nav { display: none !important; }
    .dn-burger { display: inline-flex !important; }
    .dn-section { padding: 64px 20px !important; }
    .dn-h1 { font-size: clamp(40px, 11vw, 64px) !important; line-height: 1.02 !important; }
    .dn-h2 { font-size: clamp(30px, 8vw, 46px) !important; line-height: 1.05 !important; }
    .dn-eyebrow { font-size: 11px !important; }
    .dn-grid-2,
    .dn-grid-3,
    .dn-grid-4,
    .dn-grid-asym { grid-template-columns: 1fr !important; gap: 32px !important; }
    .dn-grid-stats-4 { grid-template-columns: 1fr 1fr !important; gap: 20px !important; }
    .dn-trend-row { grid-template-columns: 1.4fr 1fr 1fr !important; }
    .dn-trend-row > .dn-trend-finish,
    .dn-trend-row > .dn-trend-ncaa,
    .dn-trend-head > .dn-trend-finish-h,
    .dn-trend-head > .dn-trend-ncaa-h { display: none !important; }
    .dn-trend-head { grid-template-columns: 1.4fr 1fr 1fr !important; }
    .dn-bars { grid-template-columns: repeat(11, 1fr) !important; }
    .dn-wall { column-count: 1 !important; }
    .dn-said-row { grid-template-columns: 1fr !important; padding: 20px !important; gap: 12px !important; }
    .dn-petition-card { padding: 36px 24px 44px !important; }
    .dn-form-row-2,
    .dn-form-row-3 { grid-template-columns: 1fr !important; }
    .dn-hero-pad { padding: 56px 24px 80px !important; }
    .dn-hero-stat { padding: 18px 22px !important; }
    .dn-arena-grid > div { padding: 18px !important; }
    .dn-cost-grid { grid-template-columns: 1fr 1fr !important; }
    .dn-footer-grid { grid-template-columns: 1fr !important; gap: 36px !important; }
  }

  /* Phone */
  @media (max-width: 380px) {
    .dn-section { padding: 56px 16px !important; }
    .dn-h1 { font-size: clamp(36px, 12vw, 52px) !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script type="text/babel" data-presets="react" src="site.jsx"></script>
</body>
</html>
